<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>おうさまいご</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding-top: 0px;
      background: #eee;
      font-size: 30px;
    }
    canvas {
      background-color: #93d4f1;
      border: 2px solid #333;
    }
    .controls {
      margin: 10px;
    }
    button {
      margin: 0 20px;
      padding: 0px 0px;
      font-size: 35px;
    }
    a {
      display: inline-block;
      margin-top: 0px;
      padding: 0px 40px;
      background-color: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }
    a:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

<a href="index.html">メインメニューにもどる</a>
<div>
  <span id="turn"></span>
</div>
<div style="position: relative; display: inline-block;">
  <canvas id="goban" width="650" height="650"></canvas>
  <div id="effectText"
    style="
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      font-size: 70px;
      font-weight: bold;
      color: black;
      text-align: center;
      pointer-events: none;
      white-space: pre-line;
      background-color: white;
      opacity: 0.8;
      padding: 20px;
      border-radius: 10px;
    ">
  </div>
</div>
<div>
<span id="blackLabel"></span><span id="blackKingLibs"></span> ため<span id="blackTameLibs">0</span>　　
<span id="whiteLabel"></span><span id="whiteKingLibs"></span> ため<span id="whiteTameLibs">1</span>
</div>

<div class="controls" id="mainControls">
  <button id="pawaBtn">パワーうち</button>
  <button id="oseBtn">リバース</button>
  <button id="passBtn">ためる</button>
  <button id="undoBtn">まった</button>
  <button id="resetBtn">こうさん</button>
</div>
<div class="controls" id="confirmControls" style="display: none;">
  <button id="cancelBtn">やめる</button>
</div>
<div class="controls" id="saigoControls" style="display: none;">
  <button id="resetBtn2">リセット</button>
</div>

<script>const SIZE = 9;</script>
<script src="js/state.js"></script>
<script src="js/draw.js"></script>
<script src="js/game.js"></script>
<script src="js/igosyori.js"></script>
<script src="js/tokugi.js"></script>
<script src="js/init.js"></script>


</body>
</html>
